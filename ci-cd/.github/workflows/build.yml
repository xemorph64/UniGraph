name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff mypy
      - run: ruff check ingestion/ graph/ rules/ ml/ backend/ compliance/
      - run: mypy ml/ backend/ --ignore-missing-imports

  lint-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/ --max-warnings 0
      - run: cd frontend && npx tsc --noEmit

  test-python:
    runs-on: ubuntu-latest
    services:
      redis: { image: redis:7-alpine, ports: ['6379:6379'] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov
      - run: pytest backend/tests/ ml/tests/ --cov=backend --cov=ml --cov-report=xml

  test-approval-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r backend/requirements.txt pytest pytest-asyncio pytest-cov
      - run: >-
          PYTHONPATH=backend pytest
          backend/tests/test_approval_routes_api.py
          backend/tests/test_reports_enforcement.py
          backend/tests/test_workflow_e2e.py
          --cov=backend.app.routers.reports
          --cov=backend.app.routers.enforcement
          --cov=backend.app.auth.jwt_rbac
          --cov-fail-under=75
          -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: 'fs', scan-ref: '.', format: 'sarif' }
      - run: pip install bandit semgrep
      - run: bandit -r backend/ ml/ -f json -o bandit-report.json
      - run: semgrep scan --config auto --json -o semgrep-report.json

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-python, lint-typescript, security-scan, test-approval-routes]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker/docker-compose.yml build