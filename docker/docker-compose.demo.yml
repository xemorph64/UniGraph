version: '3.8'

services:
  # Core infrastructure - essential for the demo
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: unigraph-neo4j
    environment:
      NEO4J_AUTH: neo4j/unigraph_dev
      NEO4J_PLUGINS: '["apoc","graph-data-science"]'
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p unigraph_dev \"RETURN 1\""]
      interval: 20s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: unigraph-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  redis_data: